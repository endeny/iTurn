<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Source Runtime Lab</title>
    <style>
      :root { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #111827; background: #f8fafc; }
      * { box-sizing: border-box; }
      body { margin: 0; }
      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }
      .app { max-width: 1440px; margin: 0 auto; padding: 24px; }
      .header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 18px; }
      .title { margin: 0; font-size: 26px; }
      .subtitle { margin: 6px 0 0; color: #64748b; }
      .grid { display: grid; grid-template-columns: 360px 1fr; gap: 16px; align-items: start; }
      .panel { background: white; border: 1px solid #e2e8f0; border-radius: 14px; padding: 16px; box-shadow: 0 1px 2px rgb(15 23 42 / 0.04); }
      .panel h2 { margin: 0 0 12px; font-size: 16px; }
      .field { display: grid; gap: 6px; margin-bottom: 12px; }
      .field label { font-weight: 650; font-size: 13px; color: #334155; }
      .field input, .field select, .field textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 9px 10px; background: white; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; }
      .btn { border: 1px solid #cbd5e1; border-radius: 10px; padding: 9px 12px; background: white; }
      .btn.primary { background: #0f172a; color: white; border-color: #0f172a; }
      .btn:disabled { opacity: .5; cursor: not-allowed; }
      .split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .list { display: grid; gap: 8px; max-height: 380px; overflow: auto; }
      .item { border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; background: #fff; text-align: left; }
      .item.selected { outline: 2px solid #0f172a; }
      .item-title { font-weight: 700; }
      .item-sub { color: #64748b; font-size: 13px; margin-top: 4px; }
      pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 12px; max-height: 520px; overflow: auto; }
      .error { color: #b91c1c; background: #fee2e2; border: 1px solid #fecaca; padding: 10px; border-radius: 12px; }
      .content { max-height: 520px; overflow: auto; line-height: 1.8; }
      .paragraph { margin: 0 0 10px; }
      @media (max-width: 1000px) { .grid, .split { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/App.tsx"></script>
  </body>
</html>
